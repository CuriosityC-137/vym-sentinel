<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0a0e1a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="manifest.json">
<title>Market Sentinel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow+Condensed:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
/* ═══ RESET & VARS ═══════════════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:       #070b16;
  --surface:  #0d1424;
  --border:   #1a2540;
  --muted:    #2a3a5c;
  --text:     #c8d8f0;
  --dim:      #5a7090;
  --mono:     'Share Tech Mono', monospace;
  --sans:     'Barlow Condensed', sans-serif;
  --green:    #00e5a0;
  --yellow:   #f0c040;
  --orange:   #f07030;
  --red:      #e03050;
  --blue:     #4090f0;
  --r:        6px;
  --gutter:   14px;
}
html{height:100%;overflow:hidden}
body{
  height:100%;background:var(--bg);color:var(--text);
  font-family:var(--sans);font-size:14px;
  display:flex;flex-direction:column;overflow:hidden;
}

/* ═══ HEADER ═════════════════════════════════════════════════ */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px var(--gutter);
  border-bottom:1px solid var(--border);
  background:linear-gradient(180deg,#0a0f1e,var(--bg));
  flex-shrink:0;
}
.logo{font-family:var(--mono);font-size:12px;color:var(--blue);letter-spacing:2px;text-transform:uppercase}
.logo span{color:var(--green)}
#clock{font-family:var(--mono);font-size:11px;color:var(--dim);text-align:right;line-height:1.5}
#market-badge{font-size:10px;font-weight:700;letter-spacing:1px;padding:2px 7px;border-radius:3px;margin-top:2px;display:inline-block}
.mkt-open{background:#00e5a020;color:var(--green);border:1px solid var(--green)}
.mkt-closed{background:#e0305020;color:var(--red);border:1px solid var(--red)}

/* ═══ TICKER TABS ════════════════════════════════════════════ */
.tab-bar{
  display:flex;gap:4px;padding:8px var(--gutter) 0;
  flex-shrink:0;overflow-x:auto;
  scrollbar-width:none;
}
.tab-bar::-webkit-scrollbar{display:none}
.tab{
  flex-shrink:0;
  font-family:var(--sans);font-size:13px;font-weight:700;letter-spacing:1px;
  padding:6px 14px;border-radius:var(--r) var(--r) 0 0;
  border:1px solid var(--border);border-bottom:none;
  background:var(--surface);color:var(--dim);
  cursor:pointer;transition:all .15s;user-select:none;
  display:flex;flex-direction:column;align-items:center;gap:1px;
}
.tab:hover{color:var(--text);background:#12192e}
.tab.active{background:#111b30;color:var(--text);border-color:var(--muted)}
.tab .tab-price{font-family:var(--mono);font-size:10px;font-weight:400;color:var(--dim)}
.tab.active .tab-price{color:var(--green)}
.tab .tab-dot{width:6px;height:6px;border-radius:50%;background:var(--muted);margin-top:1px}
.tab.active .tab-dot{background:var(--green);box-shadow:0 0 6px var(--green)}
.tab-dot.lvl-1{background:var(--yellow)!important;box-shadow:0 0 6px var(--yellow)!important}
.tab-dot.lvl-2{background:var(--orange)!important;box-shadow:0 0 6px var(--orange)!important}
.tab-dot.lvl-3{background:var(--red)!important;box-shadow:0 0 6px var(--red)!important}

/* ═══ CONTENT AREA ═══════════════════════════════════════════ */
.content{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 var(--gutter) 80px;scrollbar-width:thin;scrollbar-color:var(--border) transparent}

/* ═══ STOCK PANEL ════════════════════════════════════════════ */
.stock-panel{display:none;padding-top:10px}
.stock-panel.active{display:block}

/* Hero row */
.hero{
  display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;
}
.hero-price{
  padding:12px 14px;background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
}
.hero-price .ticker{font-family:var(--mono);font-size:11px;color:var(--dim);letter-spacing:2px}
.hero-price .price{font-family:var(--mono);font-size:28px;font-weight:400;line-height:1;margin:4px 0}
.hero-price .change{font-family:var(--mono);font-size:12px}
.pos{color:var(--green)}.neg{color:var(--red)}.neu{color:var(--dim)}

/* Threat gauge */
.threat-card{
  padding:12px 14px;border-radius:var(--r);border:1px solid var(--border);
  background:var(--surface);display:flex;flex-direction:column;justify-content:center;
}
.threat-label{font-size:10px;letter-spacing:2px;color:var(--dim);font-weight:700;margin-bottom:4px}
.threat-pct{font-family:var(--mono);font-size:32px;line-height:1;margin-bottom:6px}
.threat-bar{height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.threat-fill{height:100%;border-radius:2px;transition:width .5s}
.threat-word{font-size:11px;font-weight:700;letter-spacing:2px;margin-top:4px}

/* Section headers */
.section-hd{
  font-size:10px;font-weight:700;letter-spacing:2px;color:var(--dim);
  padding:10px 0 5px;border-bottom:1px solid var(--border);margin-bottom:6px;
  text-transform:uppercase;
}

/* Metrics grid */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.metric{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:8px 10px;
}
.metric .m-label{font-size:9px;letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;margin-bottom:2px}
.metric .m-value{font-family:var(--mono);font-size:14px}
.metric .m-sub{font-size:9px;color:var(--dim);margin-top:1px}

/* EMA strip */
.ema-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:8px}
.ema-cell{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:6px 8px;text-align:center;
}
.ema-cell .e-label{font-size:9px;color:var(--dim);letter-spacing:1px}
.ema-cell .e-val{font-family:var(--mono);font-size:11px;margin:2px 0}
.ema-cell .e-diff{font-size:9px;font-weight:700}
.above{color:var(--green)}.below{color:var(--red)}

/* Score breakdown */
.score-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.score-row{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:8px 10px;display:flex;align-items:center;justify-content:space-between;
}
.score-row .s-name{font-size:10px;letter-spacing:1px;color:var(--dim)}
.score-row .s-badge{
  font-family:var(--mono);font-size:11px;font-weight:700;
  padding:2px 7px;border-radius:3px;
}
.ok  {background:#00e5a015;color:var(--green);border:1px solid #00e5a040}
.warn{background:#f0c04015;color:var(--yellow);border:1px solid #f0c04040}
.elev{background:#f0703015;color:var(--orange);border:1px solid #f0703040}
.high{background:#e0305015;color:var(--red);border:1px solid #e0305040}

/* Stop box */
.stop-box{
  background:var(--surface);border:1px solid var(--border);border-radius:var(--r);
  padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between;
}
.stop-box .sb-label{font-size:10px;letter-spacing:1.5px;color:var(--dim)}
.stop-box .sb-val{font-family:var(--mono);font-size:16px}
.stop-box .sb-pct{font-family:var(--mono);font-size:11px;color:var(--dim);margin-top:2px}

/* Log */
.log-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:8px 10px;margin-bottom:8px;max-height:120px;overflow-y:auto}
.log-wrap::-webkit-scrollbar{width:3px}
.log-wrap::-webkit-scrollbar-track{background:transparent}
.log-wrap::-webkit-scrollbar-thumb{background:var(--border)}
.le{display:flex;gap:8px;padding:2px 0;font-family:var(--mono);font-size:10px;line-height:1.4}
.lt{color:var(--muted);flex-shrink:0}
.lm{flex:1}
.lm.ok{color:var(--green)}.lm.warn{color:var(--yellow)}.lm.err{color:var(--red)}.lm.info{color:var(--blue)}

/* ═══ BOTTOM NAV ══════════════════════════════════════════════ */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  display:flex;background:#0a0f1e;border-top:1px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom,0);
}
.bn{
  flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;
  padding:8px 4px;font-size:9px;letter-spacing:1px;color:var(--dim);
  cursor:pointer;transition:color .15s;text-transform:uppercase;font-weight:600;
}
.bn svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.bn.active{color:var(--green)}
.view{display:none}.view.active{display:block}

/* ═══ LOADING ═════════════════════════════════════════════════ */
.loading-cell{text-align:center;padding:20px;font-family:var(--mono);font-size:11px;color:var(--dim);animation:pulse 1.2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:1}}

/* ═══ MANUAL EVENTS ═══════════════════════════════════════════ */
.events-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.evt-btn{
  padding:10px 12px;border-radius:var(--r);border:1px solid var(--border);
  background:var(--surface);text-align:left;cursor:pointer;
  transition:all .15s;
}
.evt-btn:hover{border-color:var(--muted)}
.evt-btn.flagged{border-color:var(--red);background:#e0305010}
.evt-btn.flagged .eb-label{color:var(--red)}
.eb-label{font-size:10px;letter-spacing:1.5px;color:var(--dim);font-weight:700;text-transform:uppercase;display:block;margin-bottom:3px}
.eb-desc{font-size:10px;color:var(--dim);line-height:1.4}

/* ═══ SUMMARY VIEW ════════════════════════════════════════════ */
#view-summary .sum-row{
  display:flex;align-items:center;padding:10px 0;
  border-bottom:1px solid var(--border);gap:12px;
}
#view-summary .sr-ticker{font-family:var(--mono);font-size:13px;font-weight:700;min-width:50px}
#view-summary .sr-price{font-family:var(--mono);font-size:13px;flex:1}
#view-summary .sr-chg{font-family:var(--mono);font-size:11px;min-width:60px;text-align:right}
#view-summary .sr-threat{min-width:70px;text-align:right}
.threat-pill{display:inline-block;font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:3px;letter-spacing:1px}

/* scrollbar global */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>
<body>

<!-- ═══ HEADER ════════════════════════════════════════════════ -->
<header>
  <div class="logo">MARKET <span>SENTINEL</span></div>
  <div style="text-align:right">
    <div id="clock">—</div>
    <div id="market-badge" class="mkt-closed">CLOSED</div>
  </div>
</header>

<!-- ═══ CONTENT WRAPPER ═══════════════════════════════════════ -->
<div id="view-stocks" class="view active" style="display:flex;flex-direction:column;flex:1;overflow:hidden">

  <!-- Ticker tabs -->
  <div class="tab-bar" id="tab-bar"></div>

  <!-- Stock panels -->
  <div class="content" id="panels-container"></div>
</div>

<div id="view-summary" class="view content" style="padding:10px var(--gutter) 80px">
  <div class="section-hd">Portfolio Overview</div>
  <div id="summary-rows"></div>
</div>

<div id="view-log" class="view content" style="padding:10px var(--gutter) 80px">
  <div class="section-hd">Activity Log</div>
  <div id="global-log"></div>
</div>

<!-- ═══ BOTTOM NAV ════════════════════════════════════════════ -->
<nav class="bottom-nav">
  <div class="bn active" onclick="switchView('stocks')">
    <svg viewBox="0 0 24 24"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>
    STOCKS
  </div>
  <div class="bn" onclick="switchView('summary')">
    <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    OVERVIEW
  </div>
  <div class="bn" onclick="switchView('log')">
    <svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
    LOG
  </div>
</nav>

<script>
// ══════════════════════════════════════════════════════════════
// CONFIG
// ══════════════════════════════════════════════════════════════
const STOCKS = [
  { sym:'VYM',  name:'Vanguard HY Div',    stop:0.06, bench:'VOO', type:'etf'   },
  { sym:'NVDA', name:'NVIDIA Corp',         stop:0.10, bench:'QQQ', type:'stock' },
  { sym:'MAIN', name:'Main Street Capital', stop:0.08, bench:'VOO', type:'bdc'   },
  { sym:'XOM',  name:'ExxonMobil',          stop:0.08, bench:'VOO', type:'stock' },
];
const BENCH_SYMS = ['VOO','QQQ'];
const CFG = { refreshMs: 300_000, proxyBase:'https://api.allorigins.win/get?url=' };

// ══════════════════════════════════════════════════════════════
// MANUAL EVENTS (global)
// ══════════════════════════════════════════════════════════════
const GLOBAL_EVENTS = {
  sp200ma:  { name:'S&P < 200MA',    desc:'Market below long-term trend',  weight:15 },
  oilspike: { name:'Oil Spike >20%', desc:'Energy cost shock signal',       weight:10 },
  qqqrot:   { name:'QQQ Rotation',   desc:'Tech sector underperformance',   weight:10 },
};
const flaggedEvents = new Set(
  JSON.parse(localStorage.getItem('ms_events') || '[]')
);

// ══════════════════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════════════════
const S = {};          // per-symbol: { price, hist, benchHist, metrics }
const glogs = [];
let activeSym = STOCKS[0].sym;
let benchData = {};    // { VOO: [], QQQ: [] }

// ══════════════════════════════════════════════════════════════
// CLOCK + MARKET STATUS
// ══════════════════════════════════════════════════════════════
function updateClock(){
  const now = new Date();
  const et  = new Date(now.toLocaleString('en-US',{timeZone:'America/New_York'}));
  const h=et.getHours(),m=et.getMinutes(),d=et.getDay();
  const open = d>=1&&d<=5 && (h>9||(h===9&&m>=30)) && h<16;
  document.getElementById('clock').textContent =
    now.toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'})+
    '\n'+now.toLocaleDateString([],{month:'short',day:'numeric'});
  const b = document.getElementById('market-badge');
  b.textContent = open ? 'MARKET OPEN' : 'MARKET CLOSED';
  b.className = open ? 'mkt-open' : 'mkt-closed';
}
setInterval(updateClock, 1000);
updateClock();

// ══════════════════════════════════════════════════════════════
// FETCH helpers
// ══════════════════════════════════════════════════════════════
async function yahooFetch(sym, range='1y', interval='1d'){
  const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=${interval}&range=${range}`;
  const proxy = CFG.proxyBase + encodeURIComponent(url);
  const r = await fetch(proxy);
  const j = await r.json();
  const d = JSON.parse(j.contents);
  const q = d.chart.result[0];
  const closes = q.indicators.quote[0].close;
  const ts     = q.timestamp;
  return closes.map((c,i)=>({t:ts[i]*1000, c})).filter(x=>x.c!=null);
}

// ══════════════════════════════════════════════════════════════
// QUANT MATH
// ══════════════════════════════════════════════════════════════
function rets(hist){ return hist.slice(1).map((x,i)=>(x.c-hist[i].c)/hist[i].c) }
function mean(a){ return a.reduce((s,x)=>s+x,0)/a.length }
function std(a){ const m=mean(a); return Math.sqrt(a.reduce((s,x)=>s+(x-m)**2,0)/a.length) }
function ema(hist,n){
  const k=2/(n+1); let e=hist[0].c;
  return hist.map(({c})=>{e=c*k+e*(1-k);return e});
}

function calcMetrics(hist, benchH){
  if(!hist||hist.length<30) return null;
  const n = Math.min(hist.length, benchH.length);
  const h = hist.slice(-n), b = benchH.slice(-n);

  const pr = rets(h), br = rets(b);
  const pr60 = pr.slice(-60), br60 = br.slice(-60);
  const pr90 = pr.slice(-90), br90 = br.slice(-90);

  // Beta 60d
  const cov = pr60.reduce((s,r,i)=>s+(r-mean(pr60))*(br60[i]-mean(br60)),0)/pr60.length;
  const varB = pr60.reduce((s,r)=>s+(r-mean(br60))**2,0)/pr60.length;
  const beta = cov/varB;

  // Alpha 60d annualized
  const alpha = (mean(pr60)-beta*mean(br60))*252;

  // Sharpe 90d
  const rf = 0.05/252;
  const excess90 = pr90.map(r=>r-rf);
  const sharpe = excess90.length ? mean(excess90)/std(pr90)*Math.sqrt(252) : 0;

  // Sortino 90d
  const down = pr90.filter(r=>r<rf).map(r=>rf-r);
  const downStd = down.length ? Math.sqrt(down.reduce((s,x)=>s+x**2,0)/pr90.length)*Math.sqrt(252) : 0.0001;
  const sortino = mean(excess90)*252/downStd;

  // Std Dev 30d
  const stdDev = std(pr.slice(-30))*Math.sqrt(252)*100;

  // Max Drawdown 1y
  let peak=h[0].c, mdd=0;
  h.forEach(({c})=>{ if(c>peak)peak=c; const d=(peak-c)/peak; if(d>mdd)mdd=d; });

  // ATR 14
  const atr14 = hist.slice(-15).slice(1).reduce((s,{c},i)=>s+Math.abs(c-hist[hist.length-15+i].c),0)/14;

  // EMAs
  const prices = hist.map(x=>x.c);
  const emas={};
  [21,50,100,200].forEach(n=>{
    const e=ema(hist,n);
    emas[n]={val:e[e.length-1]};
  });

  // R² 60d
  const mx=mean(pr60),my=mean(br60);
  const sxy=pr60.reduce((s,r,i)=>s+(r-mx)*(br60[i]-my),0);
  const sxx=pr60.reduce((s,r)=>s+(r-mx)**2,0);
  const syy=br60.reduce((s,r)=>s+(r-my)**2,0);
  const r2=(sxx&&syy)?(sxy*sxy)/(sxx*syy):0;

  return { beta, alpha, sharpe, sortino, stdDev, mdd, atr14, emas, r2 };
}

// ══════════════════════════════════════════════════════════════
// THREAT SCORE
// ══════════════════════════════════════════════════════════════
function computeThreat(sym, hist, m){
  if(!m||!hist.length) return { total:0, scores:{} };
  const cfg = STOCKS.find(s=>s.sym===sym);
  const price = hist[hist.length-1].c;
  const scores = {};

  // 1. EMA trend
  const ema50=m.emas[50].val, ema200=m.emas[200].val;
  if(price<ema200)      scores.trend=20;
  else if(price<ema50)  scores.trend=12;
  else if(ema50<ema200) scores.trend=18;  // death cross
  else                  scores.trend=0;

  // 2. Momentum (vs 30d high)
  const high30 = Math.max(...hist.slice(-30).map(x=>x.c));
  const pullback = (high30-price)/high30;
  scores.momentum = pullback>0.10?18:pullback>0.05?10:pullback>0.02?4:0;

  // 3. Volatility
  scores.volatility = m.stdDev>35?15:m.stdDev>25?8:m.stdDev>18?3:0;

  // 4. Beta
  scores.beta = m.beta>1.2?12:m.beta>0.9?6:0;

  // 5. Drawdown proximity
  scores.drawdown = m.mdd>0.20?10:m.mdd>0.12?5:0;

  // 6. Manual global events
  let evtPts=0;
  Object.entries(GLOBAL_EVENTS).forEach(([id,e])=>{ if(flaggedEvents.has(id)) evtPts+=e.weight; });
  scores.events = Math.min(evtPts,25);

  const total = Math.min(100, Object.values(scores).reduce((s,x)=>s+x,0));
  return { total, scores };
}

function threatColor(t){
  if(t>=75) return 'var(--red)';
  if(t>=50) return 'var(--orange)';
  if(t>=30) return 'var(--yellow)';
  return 'var(--green)';
}
function threatWord(t){
  if(t>=75) return 'CRITICAL';
  if(t>=50) return 'ELEVATED';
  if(t>=30) return 'CAUTION';
  return 'NORMAL';
}
function threatClass(t){
  if(t>=75) return 'high';
  if(t>=50) return 'elev';
  if(t>=30) return 'warn';
  return 'ok';
}

// ══════════════════════════════════════════════════════════════
// BUILD DOM
// ══════════════════════════════════════════════════════════════
function buildTabs(){
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  STOCKS.forEach(cfg=>{
    const t = document.createElement('div');
    t.className = 'tab' + (cfg.sym===activeSym?' active':'');
    t.id = 'tab-'+cfg.sym;
    t.innerHTML = `<span>${cfg.sym}</span><span class="tab-price" id="tp-${cfg.sym}">—</span><span class="tab-dot" id="td-${cfg.sym}"></span>`;
    t.onclick=()=>switchStock(cfg.sym);
    bar.appendChild(t);
  });
}

        <div class="change" id="chg-${cfg.sym}"></div>
        <div style="font-size:9px;color:var(--dim);margin-top:4px">${cfg.name}</div>
      </div>
      <div class="threat-card" id="tc-${cfg.sym}">
        <div class="threat-label">THREAT LEVEL</div>
        <div class="threat-pct" id="tpct-${cfg.sym}">—</div>
        <div class="threat-bar"><div class="threat-fill" id="tfill-${cfg.sym}" style="width:0%"></div></div>
        <div class="threat-word" id="tword-${cfg.sym}">LOADING…</div>
      </div>
    </div>

    <!-- stop level -->
    <div class="stop-box">
      <div>
        <div class="sb-label">TRAILING STOP (${(cfg.stop*100).toFixed(0)}%)</div>
        <div class="sb-val" id="stop-${cfg.sym}">—</div>
      </div>
      <div style="text-align:right">
        <div class="sb-label">VS STOP</div>
        <div class="sb-val" id="vstop-${cfg.sym}" style="font-size:13px">—</div>
      </div>
    </div>

    <!-- EMAs -->
    <div class="section-hd">EMA SIGNALS</div>
    <div class="ema-strip" id="emas-${cfg.sym}">
      ${[21,50,100,200].map(n=>`<div class="ema-cell"><div class="e-label">EMA${n}</div><div class="e-val" id="e${n}-${cfg.sym}">—</div><div class="e-diff" id="ed${n}-${cfg.sym}">—</div></div>`).join('')}
    </div>

    <!-- Quant metrics -->
    <div class="section-hd">QUANT METRICS · BENCH: ${cfg.bench}</div>
    <div class="metrics" id="qm-${cfg.sym}">
      ${['Beta·60D','Alpha·60D','Sharpe·90D','Sortino·90D','StdDev·30D','MaxDraw·1Y','ATR·14D','R²·60D'].map(l=>{
        const [label,sub]=l.split('·');
        const id=label.toLowerCase().replace(/[^a-z]/g,'')+'-'+cfg.sym;
        return `<div class="metric"><div class="m-label">${label} <span style="font-size:8px;color:var(--muted)">${sub}</span></div><div class="m-value" id="${id}">—</div></div>`;
      }).join('')}
    </div>

    <!-- Score breakdown -->
    <div class="section-hd">THREAT BREAKDOWN</div>

    ${cfg.sym===STOCKS[0].sym?`

function buildAll(){
  const container = document.getElementById('panels-container');
  container.innerHTML='';
  buildTabs();
  STOCKS.forEach(cfg=>{
    container.appendChild(buildPanel(cfg));
  });
}

// ══════════════════════════════════════════════════════════════
// RENDER per-stock
// ══════════════════════════════════════════════════════════════
function renderStock(sym){
  const cfg   = STOCKS.find(s=>s.sym===sym);
  const state = S[sym];
  if(!state?.hist?.length) return;

  const hist  = state.hist;
  const price = hist[hist.length-1].c;
  const prev  = hist[hist.length-2]?.c || price;
  const chg   = price-prev, pct=(chg/prev)*100;
  const m     = state.metrics;
  const th    = state.threat || computeThreat(sym, hist, m);
  state.threat = th;

  // Tab price + dot
  const tabEl = document.getElementById('tab-'+sym);
  document.getElementById('tp-'+sym).textContent = '$'+price.toFixed(2);
  const dot = document.getElementById('td-'+sym);
  const lvl = th.total>=75?3:th.total>=50?2:th.total>=30?1:0;
  dot.className='tab-dot'+(lvl?' lvl-'+lvl:'');

  // Hero
  document.getElementById('px-'+sym).textContent = '$'+price.toFixed(2);
  const chgEl = document.getElementById('chg-'+sym);
  chgEl.className='change '+(chg>=0?'pos':'neg');
  chgEl.textContent = (chg>=0?'+':'')+chg.toFixed(2)+' ('+(chg>=0?'+':'')+pct.toFixed(2)+'%)';

  // Threat
  const tc = document.getElementById('tc-'+sym);
  const col = threatColor(th.total);
  document.getElementById('tpct-'+sym).textContent = th.total+'%';
  document.getElementById('tpct-'+sym).style.color = col;
  document.getElementById('tfill-'+sym).style.width = th.total+'%';
  document.getElementById('tfill-'+sym).style.background = col;
  const tw = document.getElementById('tword-'+sym);
  tw.textContent = threatWord(th.total);
  tw.style.color = col;

  // Stop
  const stop = price*(1-cfg.stop);
  document.getElementById('stop-'+sym).textContent = '$'+stop.toFixed(2);
  const gap = ((price-stop)/price)*100;
  const vstopEl = document.getElementById('vstop-'+sym);
  vstopEl.textContent = gap.toFixed(1)+'% above';
  vstopEl.style.color = gap<2?'var(--red)':gap<5?'var(--yellow)':'var(--green)';

  // EMAs
  if(m){
    [21,50,100,200].forEach(n=>{
      const v=m.emas[n].val;
      const diff=((price-v)/v)*100;
      document.getElementById('e'+n+'-'+sym).textContent='$'+v.toFixed(2);
      const de=document.getElementById('ed'+n+'-'+sym);
      de.textContent=(diff>=0?'+':'')+diff.toFixed(1)+'%';
      de.className='e-diff '+(diff>=0?'above':'below');
    });
  }

  // Quant metrics
  if(m){
    const qmap={
      beta:   { el:'beta-'+sym,    val:m.beta.toFixed(2),         cls:m.beta>1.2?'elev':m.beta>0.9?'warn':'ok' },
      alpha:  { el:'alpha-'+sym,   val:(m.alpha*100).toFixed(1)+'%',cls:m.alpha>0?'ok':'warn' },
      sharpe: { el:'sharpe-'+sym,  val:m.sharpe.toFixed(2),        cls:m.sharpe>1?'ok':m.sharpe>0?'warn':'elev' },
      sortino:{ el:'sortino-'+sym, val:m.sortino.toFixed(2),       cls:m.sortino>1.5?'ok':m.sortino>0.5?'warn':'elev' },
      stddev: { el:'stddev-'+sym,  val:m.stdDev.toFixed(1)+'%',   cls:m.stdDev>35?'elev':m.stdDev>22?'warn':'ok' },
      maxdraw:{ el:'maxdraw-'+sym, val:(m.mdd*100).toFixed(1)+'%',cls:m.mdd>0.20?'elev':m.mdd>0.12?'warn':'ok' },
      atr:    { el:'atr-'+sym,     val:'$'+m.atr14.toFixed(2),    cls:'ok' },
      r:      { el:'r-'+sym,       val:(m.r2*100).toFixed(0)+'%', cls:'ok' },
    };
    Object.values(qmap).forEach(({el,val,cls})=>{
      const e=document.getElementById(el);
      if(e){e.textContent=val;e.className='m-value '+cls;}
    });
  }

  // Score breakdown
  const smap={trend:'trend',momentum:'momentum',volatility:'volatility',beta:'beta',drawdown:'drawdown',events:'events'};
  Object.entries(smap).forEach(([key,sk])=>{
    const el=document.getElementById('sc-'+key+'-'+sym);
    if(!el||!th.scores) return;
    const v=th.scores[sk]||0;
    el.textContent=v;
    el.className='s-badge '+(v===0?'ok':v<=8?'warn':v<=14?'elev':'high');
  });

  updateSummaryRow(sym, price, chg, pct, th.total);
}

// ══════════════════════════════════════════════════════════════
// SUMMARY VIEW
// ══════════════════════════════════════════════════════════════
function buildSummaryRows(){
  const c=document.getElementById('summary-rows');
  c.innerHTML='';
  STOCKS.forEach(cfg=>{
    const row=document.createElement('div');
    row.className='sum-row';
    row.id='sr-'+cfg.sym;
    row.innerHTML=`
      <span class="sr-ticker" style="color:var(--blue)">${cfg.sym}</span>
      <span class="sr-price" id="srp-${cfg.sym}">—</span>
      <span class="sr-chg" id="src-${cfg.sym}">—</span>
      <span class="sr-threat"><span class="threat-pill ok" id="srt-${cfg.sym}">—</span></span>
    `;
    row.onclick=()=>{switchView('stocks');switchStock(cfg.sym);}
    c.appendChild(row);
  });
}
function updateSummaryRow(sym,price,chg,pct,threat){
  const rp=document.getElementById('srp-'+sym); if(rp)rp.textContent='$'+price.toFixed(2);
  const rc=document.getElementById('src-'+sym);
  if(rc){rc.textContent=(chg>=0?'+':'')+pct.toFixed(2)+'%';rc.className='sr-chg '+(chg>=0?'pos':'neg');}
  const rt=document.getElementById('srt-'+sym);
  if(rt){
    rt.textContent=threat+'% '+threatWord(threat);
    rt.className='threat-pill '+threatClass(threat);
  }
}

// ══════════════════════════════════════════════════════════════
// MANUAL EVENTS
// ══════════════════════════════════════════════════════════════
function toggleEvent(id){
  if(flaggedEvents.has(id)) flaggedEvents.delete(id);
  else flaggedEvents.add(id);
  localStorage.setItem('ms_events', JSON.stringify([...flaggedEvents]));
  const btn=document.getElementById('evtbtn-'+id);
  if(btn) btn.className='evt-btn'+(flaggedEvents.has(id)?' flagged':'');
  // recompute all threats
  STOCKS.forEach(({sym})=>{
    if(S[sym]?.hist?.length && S[sym]?.metrics){
      S[sym].threat = computeThreat(sym, S[sym].hist, S[sym].metrics);
      renderStock(sym);
    }
  });
  glog((flaggedEvents.has(id)?'🚨 FLAGGED: ':'✓ CLEARED: ')+GLOBAL_EVENTS[id].name, flaggedEvents.has(id)?'warn':'ok');
}

// ══════════════════════════════════════════════════════════════
// FETCH ALL
// ══════════════════════════════════════════════════════════════
async function fetchAll(){
  glog('Fetching market data…','info');

  // Fetch benchmarks first
  for(const bsym of BENCH_SYMS){
    try{
      benchData[bsym] = await yahooFetch(bsym,'1y');
      glog(`${bsym} benchmark loaded (${benchData[bsym].length} days)`,'ok');
    } catch(e){ glog(`${bsym} fetch error: ${e.message}`,'err'); }
  }

  // Fetch each stock
  for(const cfg of STOCKS){
    try{
      const hist = await yahooFetch(cfg.sym,'1y');
      const bHist = benchData[cfg.bench] || [];
      const n = Math.min(hist.length, bHist.length);
      const metrics = n>=30 ? calcMetrics(hist.slice(-n), bHist.slice(-n)) : null;
      S[cfg.sym] = { hist, metrics, threat:null };
      S[cfg.sym].threat = computeThreat(cfg.sym, hist, metrics);
      renderStock(cfg.sym);
      glog(`${cfg.sym} loaded · threat ${S[cfg.sym].threat.total}%`,'ok');
    } catch(e){
      glog(`${cfg.sym} error: ${e.message}`,'err');
    }
  }
}

// ══════════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════════
function switchStock(sym){
  activeSym=sym;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.querySelectorAll('.stock-panel').forEach(p=>p.classList.remove('active'));
  const tab=document.getElementById('tab-'+sym);
  const panel=document.getElementById('panel-'+sym);
  if(tab) tab.classList.add('active');
  if(panel) panel.classList.add('active');
}

function switchView(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.bn').forEach(el=>el.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  const navMap={stocks:0,summary:1,log:2};
  document.querySelectorAll('.bn')[navMap[v]]?.classList.add('active');
}

// ══════════════════════════════════════════════════════════════
// GLOBAL LOG
// ══════════════════════════════════════════════════════════════
function glog(msg,cls='ok'){
  const ts=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  glogs.unshift({ts,msg,cls});
  if(glogs.length>60)glogs.pop();
  document.getElementById('global-log').innerHTML=
    glogs.map(l=>`<div class="le"><span class="lt">${l.ts}</span><span class="lm ${l.cls}">${l.msg}</span></div>`).join('');
}

// ══════════════════════════════════════════════════════════════
// BOOT
// ══════════════════════════════════════════════════════════════
buildAll();
buildSummaryRows();
glog('Market Sentinel initialized · '+STOCKS.map(s=>s.sym).join(', '),'ok');
fetchAll();
setInterval(fetchAll, CFG.refreshMs);

// Service Worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
</script>
